<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ТЕТ-А-ТЕТ — кадр</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400;1,500&family=IBM+Plex+Mono:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css" />
</head>
<body class="duel">
    <div class="grain"></div>

    <header class="duel-bar">
        <div class="duel-bar-side">
            <span class="duel-bar-label">кадр</span>
            <span class="duel-round" id="round-num">I</span>
        </div>
        <div class="duel-bar-center">
            <span class="duel-bar-label">песочные часы</span>
            <div class="duel-clock" id="clock">01:30</div>
        </div>
        <div class="duel-bar-side end">
            <span class="duel-bar-label">соперник</span>
            <span class="duel-bar-opp" id="opp-name">orlov_a</span>
        </div>
    </header>

    <main class="duel-stage">
        <!-- ЛЕВЫЙ МУШКЕТЁР (вы) -->
        <aside class="fighter fighter-me" id="fighter-me">
            <div class="lives" data-side="me" id="score-me">
                <span class="life empty">◇</span>
                <span class="life empty">◇</span>
                <span class="life empty">◇</span>
                <span class="life empty">◇</span>
                <span class="life empty">◇</span>
            </div>
            <div class="fighter-figure">
                <svg viewBox="0 0 110 220" xmlns="http://www.w3.org/2000/svg" class="figure">
                    <g stroke="currentColor" stroke-width="2.4" fill="none" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M 28 38 L 55 10 L 82 38 L 70 42 L 55 36 L 40 42 Z" fill="currentColor"/>
                        <path d="M 55 10 Q 70 -2 78 6"/>
                        <circle cx="55" cy="50" r="9" stroke-width="2"/>
                        <path d="M 50 54 Q 47 56 45 55 M 60 54 Q 63 56 65 55" stroke-width="1.4"/>
                        <path d="M 38 62 Q 18 100 22 165 Q 24 195 18 215"/>
                        <path d="M 40 62 L 36 135 L 74 135 L 70 62 Z" fill="currentColor"/>
                        <line x1="38" y1="128" x2="72" y2="128" stroke-width="1.6"/>
                        <line x1="68" y1="80" x2="118" y2="68" stroke-width="2.6"/>
                        <line x1="116" y1="66" x2="120" y2="70" stroke-width="3"/>
                        <line x1="118" y1="68" x2="148" y2="60" stroke-width="1.6"/>
                        <path d="M 42 80 L 26 100 L 38 110"/>
                        <line x1="46" y1="135" x2="36" y2="200"/>
                        <line x1="64" y1="135" x2="86" y2="195"/>
                        <path d="M 30 200 L 44 205 L 44 198" fill="currentColor"/>
                        <path d="M 80 195 L 96 200 L 92 192" fill="currentColor"/>
                    </g>
                </svg>
            </div>
            <div class="fighter-name" id="my-handle">вы</div>
        </aside>

        <!-- ЦЕНТР: задача + редактор кода -->
        <div class="task-card" id="task-card">
            <div class="task-header">
                <span class="task-meta" id="task-tag">информатика · 7 класс</span>
                <span class="task-meta" id="task-points">+1 за раунд</span>
            </div>
            <div class="task-body" id="task-body">
                Загружаем Python...
            </div>
            <div class="code-area">
                <div class="code-toolbar">
                    <span class="code-lang">python 3</span>
                    <span class="code-spacer"></span>
                    <span class="code-hint" id="code-hint">используйте print() для вывода</span>
                </div>
                <textarea class="code-editor"
                          id="code-editor"
                          spellcheck="false"
                          autocomplete="off"
                          autocorrect="off"
                          autocapitalize="off"
                          wrap="off"
                          rows="9">
# ваш код:
</textarea>
                <div class="code-output" id="code-output" aria-live="polite"></div>
                <div class="code-actions">
                    <button class="btn-quiet" id="btn-run" type="button">прогнать →</button>
                    <button class="btn-stage btn-submit" id="btn-submit" type="button">отправить ✕</button>
                </div>
            </div>
        </div>

        <!-- ПРАВЫЙ МУШКЕТЁР (соперник) -->
        <aside class="fighter fighter-opp" id="fighter-opp">
            <div class="lives" data-side="opp" id="score-opp">
                <span class="life empty">◇</span>
                <span class="life empty">◇</span>
                <span class="life empty">◇</span>
                <span class="life empty">◇</span>
                <span class="life empty">◇</span>
            </div>
            <div class="fighter-figure mirror">
                <svg viewBox="0 0 110 220" xmlns="http://www.w3.org/2000/svg" class="figure">
                    <g stroke="currentColor" stroke-width="2.4" fill="none" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M 28 38 L 55 10 L 82 38 L 70 42 L 55 36 L 40 42 Z" fill="currentColor"/>
                        <path d="M 55 10 Q 70 -2 78 6"/>
                        <circle cx="55" cy="50" r="9" stroke-width="2"/>
                        <path d="M 50 54 Q 47 56 45 55 M 60 54 Q 63 56 65 55" stroke-width="1.4"/>
                        <path d="M 38 62 Q 18 100 22 165 Q 24 195 18 215"/>
                        <path d="M 40 62 L 36 135 L 74 135 L 70 62 Z" fill="currentColor"/>
                        <line x1="38" y1="128" x2="72" y2="128" stroke-width="1.6"/>
                        <line x1="68" y1="80" x2="118" y2="68" stroke-width="2.6"/>
                        <line x1="116" y1="66" x2="120" y2="70" stroke-width="3"/>
                        <line x1="118" y1="68" x2="148" y2="60" stroke-width="1.6"/>
                        <path d="M 42 80 L 26 100 L 38 110"/>
                        <line x1="46" y1="135" x2="36" y2="200"/>
                        <line x1="64" y1="135" x2="86" y2="195"/>
                        <path d="M 30 200 L 44 205 L 44 198" fill="currentColor"/>
                        <path d="M 80 195 L 96 200 L 92 192" fill="currentColor"/>
                    </g>
                </svg>
            </div>
            <div class="fighter-name" id="opp-handle">соперник</div>
        </aside>
    </main>

    <div class="duel-status" id="duel-status">грузим интерпретатор...</div>

    <!-- Отсчёт 3 — 2 — 1 -->
    <div class="countdown-overlay" id="countdown-overlay">
        <div class="countdown-num" id="countdown-num">3</div>
        <div class="countdown-label" id="countdown-label">кадр I</div>
    </div>

    <!-- Полоса удара -->
    <div class="strike-overlay" id="strike-overlay"></div>

    <!-- Финальное «занавес» -->
    <div class="round-overlay" id="round-overlay">
        <div class="round-result" id="round-result">кадр взят</div>
    </div>

    <!-- Pyodide грузим параллельно с другими скриптами -->
    <script src="https://cdn.jsdelivr.net/pyodide/v0.24.1/full/pyodide.js"></script>
    <script src="config.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
    <script src="lib-store.js"></script>
    <script src="lib-store-supabase.js"></script>
    <script src="duel.js"></script>
</body>
</html>
