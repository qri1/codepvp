<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ТЕТ-А-ТЕТ — кадр не найден</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400;1,500&family=IBM+Plex+Mono:wght@300;400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/style.css" />
</head>
<body class="landing">
    <div class="grain"></div>

    <header class="top-bar">
        <span class="seal">сезон I · MMXXVI</span>
        <span class="dot">●</span>
        <span class="meta">кадр не найден</span>
        <span class="spacer"></span>
        <a href="/" class="meta link-quiet">← к началу</a>
    </header>

    <main class="landing-stage" style="grid-template-columns: 1fr; text-align: center; padding: 6rem 2rem;">
        <section class="title-block" style="margin: 0 auto;">
            <div class="kicker">404 · кадр пропущен</div>
            <h1 class="masthead" style="justify-content: center;">
                <span>такого</span>
                <span class="amp">/</span>
                <span>кадра нет</span>
            </h1>
            <p class="lede" style="margin-left: auto; margin-right: auto;">
                страница не существует — или мы её ещё не сняли.<br/>
                сцена ждёт. вернись.
            </p>
            <div class="ornament" style="margin-left: auto; margin-right: auto;">
                <span class="orn-line"></span>
                <span class="orn-mark">✕</span>
                <span class="orn-line"></span>
            </div>
            <p class="manifesto" style="margin-left: auto; margin-right: auto;">
                <em>«ошибка — это не позор.</em><br/>
                <em>позор — стоять на месте».</em>
            </p>
            <p style="margin-top: 3rem;">
                <a href="/" class="btn-stage" style="display: inline-block; width: auto; padding: 1rem 2.4rem; text-decoration: none;">→ к началу</a>
            </p>
        </section>
    </main>

    <footer class="bottom-bar">
        <span>α-показ</span>
        <span class="dot">●</span>
        <span>без хронометра</span>
        <span class="dot">●</span>
        <span>с уважением к ошибке</span>
    </footer>
</body>
</html>
